name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: sanity gate (required) - frozen seven assertions + A8
        run: pytest tests/test_confounding_regression.py -v
      - name: full suite with coverage floor
        run: pytest --cov=theone --cov-fail-under=85 --cov-report=term
